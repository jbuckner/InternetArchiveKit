name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build DocC site
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate documentation
        run: |
          swift package --allow-writing-to-directory site \
            generate-documentation --target InternetArchiveKit \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path InternetArchiveKit \
            --output-path site

      - name: Add root redirect
        run: |
          cat > site/index.html <<'HTML'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <script>window.location.href = "documentation/internetarchivekit/"</script>
          HTML

      - name: Add the demo page
        run: cp -R demo site/demo

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
